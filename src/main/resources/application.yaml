#spring.application.name=springboot_no1

spring:
  application:
    name: springboot_no1
  datasource:
    url: jdbc:mysql://localhost:3307/shopdev
    username: root
    password: root1234
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update #create - update - none
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  mail:
    port: 465
    host: xxxx
    password: xx
    username: xx
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
    kafka:
      bootstrap-servers: localhost:19092
      consumer:
        group-id: otp-group-id
        auto-offset-reset: earliest
        enable-auto-commit: true